name: Test zenduty with deprecated api key inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token
          org: my-org
          zenduty_api_key: fake-zenduty-api-key
          zenduty_service_id: fake-service-id
          zenduty_escalation_policy_id: fake-escalation-policy-id
          count: '10'
      - name: Assert action ran (may fail due to invalid credentials)
        run: |
          echo "Action completed (with or without error due to fake credentials)"
          echo "PASS"
