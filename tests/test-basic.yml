name: Test basic usage with token and filters
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          count: 5
          severity: high,critical
          ecosystem: npm,pip
      - name: Assert action ran
        run: |
          echo "Action completed (may have failed due to invalid token, which is expected)"
          echo "PASS"
