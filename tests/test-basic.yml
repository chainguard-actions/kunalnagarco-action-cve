name: Test basic usage with token and filters
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          count: '5'
          severity: 'high,critical'
          ecosystem: 'npm,pip'
          ignore: 'lodash,axios'
      - name: Assert action ran (may fail due to invalid token)
        run: |
          echo "Action completed (with or without error due to fake token)"
          echo "PASS: inputs were accepted"
