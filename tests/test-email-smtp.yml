name: Test email notification via SMTP
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          email_from: sender@example.com
          email_list: recipient1@example.com,recipient2@example.com
          email_subject: CVE Vulnerability Report
          email_transport_smtp_host: smtp.gmail.com
          email_transport_smtp_port: 587
          email_transport_smtp_user: fake-smtp-user@example.com
          email_transport_smtp_password: fake-smtp-password
          count: 10
      - name: Assert action ran
        run: |
          echo "Action completed (may have failed due to invalid credentials, which is expected)"
          echo "PASS"
