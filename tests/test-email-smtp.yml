name: Test email alerts via SMTP
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          email_from: 'sender@example.com'
          email_list: 'recipient1@example.com,recipient2@example.com'
          email_subject: 'CVE Alert Test'
          email_transport_smtp_host: 'smtp.example.com'
          email_transport_smtp_port: '587'
          email_transport_smtp_user: 'smtp-user@example.com'
          email_transport_smtp_password: 'fake-smtp-password'
          count: '10'
      - name: Assert action ran with SMTP email inputs
        run: |
          echo "Action completed (with or without error due to fake credentials)"
          echo "PASS: email_from, email_list, email_subject, email_transport_smtp_user, and email_transport_smtp_password inputs were accepted"
