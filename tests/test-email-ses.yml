name: Test email alerts via AWS SES
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          email_from: 'sender@example.com'
          email_list: 'recipient@example.com'
          email_transport_ses_region: 'us-east-1'
          email_transport_ses_access_key_id: 'AKIAFAKEACCESSKEYID'
          email_transport_ses_secret_access_key: 'fake-ses-secret-access-key'
      - name: Assert action ran (may fail due to invalid SES credentials)
        run: |
          echo "Action completed (with or without error due to fake SES credentials)"
          echo "PASS: email SES inputs were accepted"
