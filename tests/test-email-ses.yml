name: Test email AWS SES transport inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          email_from: 'sender@example.com'
          email_list: 'recipient@example.com'
          email_subject: 'CVE Alert Test - SES Transport'
          email_transport_ses_region: 'us-east-1'
          email_transport_ses_access_key_id: 'AKIAFAKEACCESSKEYID'
          email_transport_ses_secret_access_key: 'fake-ses-secret-access-key-for-testing'
          count: '1'
          severity: 'critical'
        continue-on-error: true
      - name: Assert action ran with SES email transport inputs
        run: |
          echo "Action completed (may have failed due to invalid SES credentials, which is expected)"
          echo "PASS: email_transport_ses_region, email_transport_ses_access_key_id, and email_transport_ses_secret_access_key inputs were accepted"
