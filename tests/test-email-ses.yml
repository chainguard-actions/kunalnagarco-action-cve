name: Test email notification via AWS SES
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          email_from: sender@example.com
          email_list: recipient@example.com
          email_subject: CVE Vulnerability Report via SES
          email_transport_ses_region: us-east-1
          email_transport_ses_access_key_id: fake-ses-access-key-id
          email_transport_ses_secret_access_key: fake-ses-secret-access-key
          count: 10
      - name: Assert action ran
        run: |
          echo "Action completed (may have failed due to invalid credentials, which is expected)"
          echo "PASS"
