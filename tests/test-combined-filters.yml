name: Test combined severity and ecosystem filters
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with combined severity and ecosystem filters
        id: action
        uses: .
        with:
          token: ${{ github.token }}
          severity: 'high,critical'
          ecosystem: 'npm'
          count: '20'
        continue-on-error: true
      - name: Assert action ran (success or expected API failure)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should either succeed (combined filters are valid, no destination means no send)
          # or fail due to Dependabot not being enabled on the repo (403 API error).
          # Both are valid outcomes — what matters is the action ran without crashing the runner.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with outcome: $OUTCOME"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
