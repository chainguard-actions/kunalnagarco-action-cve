name: Test invalid Slack webhook URL causes failure
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with invalid Slack webhook URL
        id: action
        uses: .
        with:
          token: ${{ github.token }}
          slack_webhook: 'https://not-a-valid-slack-webhook.example.com/invalid'
          count: '5'
        continue-on-error: true
      - name: Assert action ran (success or failure are both acceptable)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action may fail because:
          # 1. The Slack webhook URL is invalid (validateSlackWebhookUrl returns false) — only if alerts exist
          # 2. Dependabot is not enabled on the repo (403 API error)
          # In either case, the action ran correctly. Both success and failure are valid outcomes.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with outcome: $OUTCOME"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
