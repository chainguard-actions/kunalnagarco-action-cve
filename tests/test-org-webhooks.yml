name: Test org-level alerts with webhooks
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          org: my-test-org
          microsoft_teams_webhook: https://outlook.office.com/webhook/fake-teams-webhook
          slack_webhook: https://hooks.slack.com/services/fake/slack/webhook
          count: 10
      - name: Assert action ran
        run: |
          echo "Action completed (may have failed due to invalid credentials, which is expected)"
          echo "PASS"
