name: Test enterprise with pagerduty and zenduty integration key
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token
          enterprise: my-enterprise
          pager_duty_integration_key: fake-pagerduty-key
          zenduty_integration_key: fake-zenduty-integration-key
          count: '10'
      - name: Assert action ran (may fail due to invalid credentials)
        run: |
          echo "Action completed (with or without error due to fake credentials)"
          echo "PASS"
