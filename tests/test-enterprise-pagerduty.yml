name: Test enterprise-level alerts with PagerDuty
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          enterprise: my-test-enterprise
          pager_duty_integration_key: fake-pagerduty-integration-key
          count: 20
      - name: Assert action ran
        run: |
          echo "Action completed (may have failed due to invalid credentials, which is expected)"
          echo "PASS"
