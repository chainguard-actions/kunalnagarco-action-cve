name: Test PagerDuty and Zenduty integration inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          pager_duty_integration_key: 'fake-pagerduty-key-12345'
          zenduty_integration_key: 'fake-zenduty-integration-key'
          zenduty_api_key: 'fake-zenduty-api-key'
          zenduty_service_id: 'fake-zenduty-service-id'
          zenduty_escalation_policy_id: 'fake-zenduty-escalation-policy-id'
          count: '10'
      - name: Assert action ran with pagerduty and zenduty inputs
        run: |
          echo "Action completed (with or without error due to fake credentials)"
          echo "PASS: pager_duty_integration_key, zenduty_integration_key, zenduty_api_key, zenduty_service_id, and zenduty_escalation_policy_id inputs were accepted"
