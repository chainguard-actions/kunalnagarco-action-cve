name: Test org-level alerts input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          org: 'fake-org-for-testing'
          count: '1'
          severity: 'critical'
        continue-on-error: true
      - name: Assert action ran with org input
        run: |
          echo "Action completed (may have failed due to invalid org, which is expected)"
          echo "PASS: org input was accepted"
