name: Test Zenduty integration
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          zenduty_api_key: fake-zenduty-api-key
          zenduty_service_id: fake-zenduty-service-id
          zenduty_escalation_policy_id: fake-zenduty-escalation-policy-id
          count: 10
      - name: Assert action ran
        run: |
          echo "Action completed (may have failed due to invalid credentials, which is expected)"
          echo "PASS"
