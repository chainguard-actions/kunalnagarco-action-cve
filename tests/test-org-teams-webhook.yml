name: Test org and microsoft_teams_webhook inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: fake-token-for-coverage
          org: my-test-org
          microsoft_teams_webhook: https://outlook.office.com/webhook/fake-webhook-url
          count: '1'
        continue-on-error: true
      - name: Assert action ran (inputs were accepted)
        run: |
          echo "Action completed (with or without error due to fake credentials)"
          echo "PASS: org and microsoft_teams_webhook inputs were accepted"
